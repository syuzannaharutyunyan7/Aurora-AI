<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aurora AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Inter;
height:100vh;
display:flex;
background:#0b1020;
color:white;
overflow:hidden;
}

.sidebar{
width:280px;
background:#0f172a;
padding:15px;
border-right:1px solid rgba(255,255,255,0.06);
display:flex;
flex-direction:column;
}

.logo{
font-size:24px;
font-weight:700;
margin-bottom:15px;
background:linear-gradient(90deg,#a78bfa,#60a5fa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.newChat{
padding:14px;
font-size:16px;
font-weight:600;
border-radius:25px;
background:rgba(255,255,255,0.05);
color:white;
border:none;
cursor:pointer;
margin-bottom:20px;
}

.title{
font-size:14px;
font-weight:700;
color:#cbd5e1;
margin-top:25px;
}

.file{
background:rgba(255,255,255,0.05);
padding:8px;
margin-top:6px;
border-radius:8px;
font-size:12px;
}

.chat{
flex:1;
display:flex;
flex-direction:column;
}

.topbar{
height:60px;
display:flex;
align-items:center;
justify-content:center;
background:rgba(255,255,255,0.03);
border-bottom:1px solid rgba(255,255,255,0.05);
font-weight:600;
}

.messages{
flex:1;
padding:20px;
overflow-y:auto;
}

.msg{
max-width:75%;
padding:12px;
margin-bottom:12px;
border-radius:12px;
line-height:1.4;
word-wrap:break-word;
position:relative;
}

.user{
margin-left:auto;
background:linear-gradient(135deg,#7c3aed,#2563eb);
}

.ai{
background:rgba(255,255,255,0.05);
}

.content{
white-space:pre-wrap;
}

.inputBar{
display:flex;
padding:12px;
border-top:1px solid rgba(255,255,255,0.06);
}

textarea{
flex:1;
height:50px;
border:none;
outline:none;
border-radius:10px;
padding:10px;
background:rgba(255,255,255,0.05);
color:white;
resize:none;
}

button{
width:90px;
margin-left:10px;
border:none;
border-radius:10px;
background:#7c3aed;
color:white;
cursor:pointer;
}

.editBox{
width:100%;
min-height:50px;
background:rgba(255,255,255,0.05);
color:white;
border:none;
padding:10px;
border-radius:8px;
outline:none;
margin-top:10px;
}

</style>
</head>

<body>

<div class="sidebar">

<div class="logo">✦ Aurora</div>

<button class="newChat" onclick="clearChat()">
New Chat
</button>

<div class="title">Files</div>

<div id="fileList"></div>

<input type="file" id="file" hidden onchange="upload()">

<button class="newChat"
onclick="document.getElementById('file').click()">
+ Upload
</button>

</div>

<div class="chat">

<div class="topbar">
Aurora AI
</div>

<div class="messages" id="chat"></div>

<div class="inputBar">
<textarea id="input" placeholder="Message..."></textarea>
<button onclick="send()">➤</button>
</div>

</div>

<script>

let chat = document.getElementById("chat");
let input = document.getElementById("input");

/* MESSAGE IDS */
let messageId = 0;

/* WELCOME */
add("Hello, I’m Aurora ✦", "ai");

/* ENTER KEY */
input.addEventListener("keydown", function(e){

if(e.key === "Enter" && !e.shiftKey){
e.preventDefault();
send();
}

});

/* -------------------------------- */
/* ADD MESSAGE */
/* -------------------------------- */
function add(text, cls, isUser=false, id=null){

let wrapper = document.createElement("div");

wrapper.className = "msg " + cls;

/* STORE ID */
if(id !== null){
wrapper.dataset.id = id;
}

/* CONTENT */
let content = document.createElement("div");

content.className = "content";

content.innerText = text;

wrapper.appendChild(content);

/* USER EDIT BUTTON */
if(isUser){

let btn = document.createElement("button");

btn.innerText = "✏️";

btn.style.marginTop = "10px";
btn.style.width = "50px";
btn.style.background = "rgba(255,255,255,0.15)";
btn.style.borderRadius = "8px";

btn.onclick = () => enableEdit(wrapper);

wrapper.appendChild(btn);

}

chat.appendChild(wrapper);

chat.scrollTop = chat.scrollHeight;

}

/* -------------------------------- */
/* ENABLE EDIT */
/* -------------------------------- */
function enableEdit(wrapper){

let contentDiv = wrapper.querySelector(".content");

let oldText = contentDiv.innerText;

/* EDIT BOX */
let box = document.createElement("textarea");

box.className = "editBox";

box.value = oldText;

/* REPLACE */
contentDiv.replaceWith(box);

/* SAVE BUTTON */
let save = document.createElement("button");

save.innerText = "✔";

save.style.background = "#22c55e";
save.style.width = "60px";
save.style.marginTop = "10px";

/* SAVE */
save.onclick = async () => {

let newText = box.value.trim();

if(!newText) return;

/* RESTORE CONTENT */
let newDiv = document.createElement("div");

newDiv.className = "content";

newDiv.innerText = newText;

box.replaceWith(newDiv);

save.remove();

/* MESSAGE ID */
let msgId = parseInt(wrapper.dataset.id);

/* UPDATE REQUEST */
let res = await fetch("/update_last", {

method: "POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({
id: msgId,
message: newText
})

});

let data = await res.json();

/* FIND AI */
let targetAI = document.querySelector(
`.msg.ai[data-id="${msgId}"] .content`
);

/* UPDATE AI */
if(targetAI && data.response){

targetAI.innerText = data.response;

}

};

wrapper.appendChild(save);

}

/* -------------------------------- */
/* SEND */
/* -------------------------------- */
async function send(){

let msg = input.value.trim();

if(!msg) return;

/* CURRENT ID */
let currentId = messageId;

/* USER */
add(msg, "user", true, currentId);

input.value = "";

/* FETCH */
let res = await fetch("/chat", {

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({
message: msg
})

});

let text = await res.text();

/* AI WRAPPER */
let aiWrapper = document.createElement("div");

aiWrapper.className = "msg ai";

/* IMPORTANT */
aiWrapper.dataset.id = currentId;

/* AI CONTENT */
let aiContent = document.createElement("div");

aiContent.className = "content";

aiWrapper.appendChild(aiContent);

chat.appendChild(aiWrapper);

/* TYPE EFFECT */
let i = 0;

let interval = setInterval(() => {

if(i < text.length){

aiContent.innerText += text[i];

i++;

chat.scrollTop = chat.scrollHeight;

}else{

clearInterval(interval);

}

}, 10);

/* NEXT ID */
messageId++;

}

/* -------------------------------- */
/* CLEAR CHAT */
/* -------------------------------- */
async function clearChat(){

await fetch("/reset", {
method:"POST"
});

chat.innerHTML = "";

document.getElementById("fileList").innerHTML = "";

messageId = 0;

add("New chat started ✦", "ai");

}

/* -------------------------------- */
/* UPLOAD */
/* -------------------------------- */
async function upload(){

let file = document.getElementById("file").files[0];

if(!file) return;

add("Uploading " + file.name + "...", "ai");

let form = new FormData();

form.append("file", file);

let res = await fetch("/upload", {
method:"POST",
body: form
});

let data = await res.json();

add("📎 " + data.file + " (" + data.chunks + " chunks)", "ai");

/* SIDEBAR */
let div = document.createElement("div");

div.className = "file";

div.innerText = "📄 " + data.file;

document.getElementById("fileList").appendChild(div);

}

</script>

</body>
</html>
